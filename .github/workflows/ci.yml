name: CI

on:
  push:
    branches: [main]
  pull_request:

# The pure-Python readers (NVIDIA CSV, AMD rocprof CSV, Linux perf, Metal JSON)
# parse committed text/JSON fixtures, so the full registry/platform/backend suite
# runs on every OS with NO GPU and NO profiler installed. Real binary-capture
# tests are fixture-gated and skip when their hardware report is absent.
# The macOS job digesting the NVIDIA fixture IS the "CUDA-dev-on-a-Mac" proof.
jobs:
  test:
    name: test (${{ matrix.os }}, py${{ matrix.python }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.13"]
        include:
          # the declared floor (requires-python >=3.11) is actually tested (issue #5)
          - os: ubuntu-latest
            python: "3.11"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Sync (dev only — pure-Python readers cover the suite, no hardware)
        run: uv sync --extra dev --python ${{ matrix.python }}
      - name: Run tests
        # run must pin the SAME python + extras as sync: with a bare `uv run`,
        # a python-version mismatch recreates the venv without the dev extra
        # and pytest vanishes mid-job.
        run: uv run --extra dev --python ${{ matrix.python }} pytest -q
